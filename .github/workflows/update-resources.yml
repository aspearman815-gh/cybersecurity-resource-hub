name: Update Cyber Resources

on:
  schedule:
    # Twice weekly: Tue & Fri at 14:10 UTC (morning Eastern)
    - cron: "10 14 * * 2,5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cyber-resources
  cancel-in-progress: false

env:
  # ===== Source controls =====
  ENABLE_LINKEDIN_SCRAPE: "false"
  LI_LOCATION: "United States"
  LI_REMOTE_ONLY: "true"
  LI_TIME_RANGE: "r604800"

  # ===== Indeed RSS queries =====
  INDEED_ENTRY_QUERY: '("cybersecurity" OR "security analyst" OR SOC) ("entry level" OR junior OR "analyst I" OR associate)'
  INDEED_INTERN_QUERY: '("cybersecurity" OR "information security") (intern OR internship)'
  INDEED_LOCATION: "Remote"

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug working directory
        run: |
          echo "PWD: $(pwd)"
          ls -la
          echo "Scripts directory:"
          ls -la scripts || true
          echo "Workflows directory:"
          ls -la .github/workflows || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "**/requirements.txt"

      - name: Verify requirements file
        run: |
          echo "Looking for requirements.txt..."
          find . -name "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scripts/update_resources.py

      - name: Commit changes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update cyber jobs (LinkedIn + Indeed)"
          branch: ${{ github.ref_name }}
