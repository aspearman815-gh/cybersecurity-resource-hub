name: Update Cyber Resources

on:
  schedule:
    - cron: "10 14 * * 2,5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cyber-resources
  cancel-in-progress: false

env:
  ENABLE_LINKEDIN_SCRAPE: "false"
  LI_LOCATION: "United States"
  LI_REMOTE_ONLY: "true"
  LI_TIME_RANGE: "r604800"

  INDEED_ENTRY_QUERY: '("cybersecurity" OR "security analyst" OR SOC) ("entry level" OR junior OR "analyst I" OR associate)'
  INDEED_INTERN_QUERY: '("cybersecurity" OR "information security") (intern OR internship)'
  INDEED_LOCATION: "Remote"

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo contents (debug)
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scripts/update_resources.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update cyber resources"
