name: Update Cyber Resources

on:
  schedule:
    # Twice weekly: Tue & Fri at 14:10 UTC (morning Eastern)
    - cron: "10 14 * * 2,5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cyber-resources
  cancel-in-progress: false

# ---------- You can tune these without editing the Python script ----------
env:
  # LinkedIn: default to LINKS ONLY (compliant with policy). Set to "true" to try guest-endpoint collection (undocumented; may break).
  ENABLE_LINKEDIN_SCRAPE: "false"
  LI_LOCATION: "United States"        # e.g., "Atlanta, Georgia, United States"
  LI_REMOTE_ONLY: "true"              # true: remote-only | false: include onsite/hybrid
  LI_TIME_RANGE: "r604800"            # r86400=24h, r604800=7d, r2592000=30d

  # Indeed (RSS) queries
  INDEED_ENTRY_QUERY: '("cybersecurity" OR "security analyst" OR SOC) ("entry level" OR junior OR "analyst I" OR associate)'
  INDEED_INTERN_QUERY: '("cybersecurity" OR "information security") (intern OR internship)'
  INDEED_LOCATION: "Remote"           # e.g., "Atlanta, GA" or "Remote"

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify repository layout & requirements.txt
        run: |
          echo "---- PWD ----"
          pwd
          echo "---- Root listing ----"
          ls -la
          echo "---- .github/workflows ----"
          ls -la .github/workflows || true
          echo "---- scripts ----"
          ls -la scripts || true

          echo "---- Verify requirements.txt exists in repo root ----"
          if [ ! -f "requirements.txt" ]; then
            echo "::error::requirements.txt not found in repo root. Add it at /requirements.txt (not in subfolders)."
            exit 1
          fi

          echo "---- requirements.txt content ----"
          nl -ba requirements.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          if [ ! -f "scripts/update_resources.py" ]; then
            echo "::error::scripts/update_resources.py not found. Ensure the file path is scripts/update_resources.py."
            exit 1
          fi
          python scripts/update_resources.py

      - name: Commit changes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update cyber jobs (LinkedIn + Indeed)"
          # branch: ${{ github.ref_name }}  # usually not needed; the action detects current branch
