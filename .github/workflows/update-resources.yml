name: Update Cyber Resources

on:
  schedule:
    # Twice weekly: Tue & Fri at 14:10 UTC (morning Eastern)
    - cron: "10 14 * * 2,5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cyber-resources
  cancel-in-progress: false

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug working directory
        run: |
          echo "PWD: $(pwd)"
          ls -la
          ls -la scripts || true
          ls -la .github/workflows || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dateutil lxml

      - name: Run scraper
        run: python scripts/update_resources.py

      - name: Commit changes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update cyber resources"
          # Let the action detect the current/default branch automatically
          # branch: ${{ github.ref_name }}
